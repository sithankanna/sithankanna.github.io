<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 150" width="420" height="150" font-family="Georgia, 'Times New Roman', serif" fill="#252825" role="img" aria-label="Unembedding step: X_t (t by d_emb) times W_U (d_emb by d_vocab) equals Z_t (t by d_vocab) logits">
  <!-- dimension brace over Z_t -->
  <g stroke="#252825" stroke-width="0.9" fill="none">
    <path d="M256,46 L256,50 M256,46 L366,46 M366,46 L366,50 M311,46 L311,42"/>
  </g>
  <text x="311" y="36" text-anchor="middle" font-size="10"><tspan font-style="italic">d</tspan><tspan font-size="8" dy="2">vocab</tspan><tspan dy="-2" font-size="10"> (Logits)</tspan></text>

  <!-- X_t -->
  <rect x="50" y="60" width="44" height="56" rx="3" fill="#ececea" stroke="#9aa09a"/>
  <text x="72" y="86" text-anchor="middle" font-size="14" font-weight="bold" font-style="italic">X<tspan font-size="9" font-weight="normal" dy="3">t</tspan></text>
  <text x="72" y="102" text-anchor="middle" font-size="9" fill="#686e68"><tspan font-style="italic">t</tspan> &#215; <tspan font-style="italic">d</tspan><tspan font-size="7" dy="2">emb</tspan></text>

  <text x="106" y="93" text-anchor="middle" font-size="15" font-weight="bold">&#215;</text>

  <!-- W_U -->
  <rect x="120" y="66" width="110" height="44" rx="3" fill="#e8f0fa" stroke="#3f6fa0"/>
  <text x="175" y="86" text-anchor="middle" font-size="14" font-weight="bold" font-style="italic">W<tspan font-size="9" font-weight="normal" dy="3">U</tspan></text>
  <text x="175" y="100" text-anchor="middle" font-size="9" fill="#686e68"><tspan font-style="italic">d</tspan><tspan font-size="7" dy="2">emb</tspan><tspan dy="-2"> &#215; </tspan><tspan font-style="italic">d</tspan><tspan font-size="7" dy="2">vocab</tspan></text>

  <text x="242" y="93" text-anchor="middle" font-size="15" font-weight="bold">=</text>

  <!-- Z_t -->
  <rect x="256" y="60" width="110" height="56" rx="3" fill="#ececea" stroke="#9aa09a"/>
  <text x="311" y="86" text-anchor="middle" font-size="14" font-weight="bold" font-style="italic">Z<tspan font-size="9" font-weight="normal" dy="3">t</tspan></text>
  <text x="311" y="102" text-anchor="middle" font-size="9.5" fill="#686e68"><tspan font-style="italic">t</tspan> &#215; <tspan font-style="italic">d</tspan><tspan font-size="7.5" dy="2">vocab</tspan></text>
</svg>
