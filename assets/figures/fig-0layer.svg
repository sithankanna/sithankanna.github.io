<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 130" width="560" height="130" font-family="Georgia, 'Times New Roman', serif" fill="#252825" role="img" aria-label="0-Layer Transformer: input U_t goes through embedding W_E, unembedding W_U, then softmax to produce Y-hat_t">
  <defs>
    <marker id="ah0" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#252825"/>
    </marker>
  </defs>
  <!-- outer dashed model box around W_E and W_U -->
  <rect x="92" y="28" width="190" height="74" rx="6" fill="none" stroke="#9aa09a" stroke-width="1" stroke-dasharray="5 4"/>
  <!-- input U_t -->
  <text x="24" y="69" font-size="16" font-weight="bold" font-style="italic">U<tspan font-size="10" font-weight="normal" dy="3">t</tspan></text>
  <line x1="46" y1="65" x2="108" y2="65" stroke="#252825" stroke-width="1.1" marker-end="url(#ah0)"/>
  <!-- W_E (tall narrow) -->
  <rect x="112" y="40" width="26" height="50" rx="3" fill="#e8f0fa" stroke="#3f6fa0"/>
  <text x="125" y="69" text-anchor="middle" font-size="13" font-weight="bold" font-style="italic">W<tspan font-size="9" font-weight="normal" dy="3">E</tspan></text>
  <!-- arrow W_E -> W_U labelled X_t -->
  <line x1="138" y1="65" x2="218" y2="65" stroke="#252825" stroke-width="1.1" marker-end="url(#ah0)"/>
  <text x="178" y="58" text-anchor="middle" font-size="12" font-weight="bold" font-style="italic">X<tspan font-size="8" font-weight="normal" dy="2">t</tspan></text>
  <!-- W_U (wide short) -->
  <rect x="222" y="52" width="50" height="26" rx="3" fill="#e8f0fa" stroke="#3f6fa0"/>
  <text x="247" y="69" text-anchor="middle" font-size="13" font-weight="bold" font-style="italic">W<tspan font-size="9" font-weight="normal" dy="3">U</tspan></text>
  <!-- arrow W_U -> softmax labelled Z_t -->
  <line x1="282" y1="65" x2="372" y2="65" stroke="#252825" stroke-width="1.1" marker-end="url(#ah0)"/>
  <text x="327" y="58" text-anchor="middle" font-size="12" font-weight="bold" font-style="italic">Z<tspan font-size="8" font-weight="normal" dy="2">t</tspan></text>
  <!-- softmax -->
  <rect x="376" y="50" width="92" height="30" rx="4" fill="#fce6cd" stroke="#d18a2a"/>
  <text x="422" y="69" text-anchor="middle" font-size="13">softmax(&#183;)</text>
  <!-- arrow softmax -> output -->
  <line x1="468" y1="65" x2="500" y2="65" stroke="#252825" stroke-width="1.1" marker-end="url(#ah0)"/>
  <!-- output Y-hat_t -->
  <text x="510" y="69" font-size="16" font-weight="bold" font-style="italic">&#374;<tspan font-size="10" font-weight="normal" dy="3">t</tspan></text>
</svg>
